        title: "Аукціон"
        ul01: "Формування команд в лізі відбувається за результатами аукціону."
        ul02: "Стартовий аукціон проводиться перед початком сезону, але надалі менеджери матимуть можливість змінити склад своєї команди на додаткових аукціонах, які відбуватимуться у визначений час («трансферні вікна») протягом сезону."
        ul03: "Кожний менеджер, перед стартовим аукціоном, отримує бюджет у 260 мільйонів для придбання гравців."
        ul04: "Кожна команда має складатись з 26 гравців (з яких мінімум 3 мають бути воротарями)."
        ul05: "Команди формуються з реальних гравців обраного футбольного чемпіонату."
        ul06: "Кожен гравець є унікальним і може бути представлений тільки в одній команді ліги."
        ul07: "Обмеження щодо кількості представників одного футбольного клубу в одній команді відсутні."
        ul08: "Вхідні трансфери поза трансферними вікнами не передбачені."
        ul09: "Існує два види аукціону: сліпий (за замовчуванням) і живий."
        ul11: "Сліпий аукціон проходить онлайн безпосередньо на сайті MantraFootball у декілька етапів."
        ul12: "На початковому аукціоні менеджерам доступний список з усіх гравців відповідного футбольного чемпіонату, з яких необхідно придбати 26 гравців (мінімум 3 з яких воротарі), використавши свій стартовий бюджет (260 мільйонів)."
        ul13: "На першому етапі аукціону менеджерам необхідно зробити ставку на 11 гравців (мінімум 1 з яких воротар), розподіливши до 220 мільйонів із бюджету команди (ще 40 мільйонів зарезервовані та будуть доступні з другого етапу)."
        ul14: "На другому та подальших етапах аукціону менеджерам необхідно буде зробити ставку на X гравців, де X - це 26 мінус кількість гравців придбаних до цього."
        ul15: "Ставка є цілим числом кратним 1 (де 1 означає 1 мільйон)."
        ul16: "Мінімальна ставка на гравця на перших двох етапах стартового аукціону залежить від виступів гравця у цьому чемпіонаті минулого сезону - від 1 до 20 мільйонів. З третього етапу стартового аукціону та на проміжних аукціонах мінімальна ставка становить 1 мільйон для всіх гравців."
        ul17: "Максимальна ставка на гравця обмежується лише загальним бюджетом команди."
        ul18: "Перший етап стартового аукціону завершується у заздалегідь визначений дедлайн, за умови що усі менеджери ліги підтвердять свої ставки. Подальші етапи стартового аукціону розраховуються протягом 10 хвилин після того, як усі менеджери остаточно закриють ставки, або після дедлайну за умови, що всі ставки підтверджені."
        ul19: "Етапи проміжних аукціонів розраховуються завчасно при наявності остаточно закритих ставок в усіх менеджерів ліги, або по дедлайну етапу - з врахуванням лише підтверджених ставок на момент дедлайну."
        ul20: "Після завершення етапу аукціону система автоматично порівнює ставки, зроблені усіма менеджерами."
        ul21: "Менеджер, який зробив найвищу ставку на певного гравця забирає його до своєї команди, автоматично зменшуючи свій бюджет на суму зробленої на цього гравця ставки."
        ul22: "Якщо менеджеру не вдалось придбати гравця, сума ставки на нього повертається до бюджету."
        ul23: "Якщо декілька менеджерів зробили рівну ставку на певного гравця, і цю ставку ніхто не перевищив, такий гравець вважається непроданим і залишається доступним для придбання будь-яким менеджером на наступних етапах аукціону (а зроблені на нього ставки повертаються)."
        ul24: "Етапи аукціону повторюються поки всі менеджери повністю не сформують свої команди з 26 гравців."
        ul25: "До закінчення чергового етапу аукціону менеджери не повинні знати, яких гравців обрали інші менеджери та які ставки вони зробили."
        ul26: "Після завершення аукціону історію ставок можна переглянути на відповідній сторінці аукціону."
        ul27: "Якщо менеджер не робить ставку до дедлайну першого етапу стартового аукціону, то його команда отримує -1 очко штрафу у турнірній таблиці. За кожні наступні 12 годин протермінування ставки на аукціоні команді нараховується додатково по -1 очку штрафу. При відсутності ставки понад 2 доби від дедлайну, менеджер команди може бути замінений."
        ul31: "Під час трансферного вікна (після його оголошення і до встановленого дедлайну) менеджер може вибрати декількох гравців своєї команди для продажу."
        ul32: "Сума, яка була раніше сплачена менеджером за цього гравця, повертається в його бюджет, а сам гравець стає вільним агентом. Такий гравець буде доступний для придбання будь-яким іншим менеджером ліги, крім того, що його продав. Менеджер, який продав гравця, зможе придбати його не раніше наступного трансферного вікна."
        ul33: "Протягом сезону трансферне вікно відкривається 4 рази (за винятком деяких чемпіонатів, в яких цей показник може бути вищим). Точний графік можна знайти в меню «Аукціони» ліги після її створення. Приблизний же графік наступний: І – перша половина вересня, ІІ – друга половина листопада, ІІІ – перша половина лютого, ІV – друга половина березня."
        ul34: "На сезон кожна команда отримує певну кількість трансферних слотів (20 у сезоні 2025/26), які можна розподіляти на аукціони протягом сезону, однак має залишатися мінімум 2 слоти на кожен аукціон."
        ul35: "Якщо в певному чемпіонаті буде понад 4 проміжні аукціони, або ліга стартуватиме пізніше, то кількість слотів буде розраховуватися як 5 слотів на кожен проміжний аукціон."
        ul36: "Гравець, який покинув чемпіонат (через трансфер, дострокове розірвання контракту тощо), покидає команду самостійно і сума сплачена за нього повертається до бюджету менеджера."
        ul37: "Гравець, який змінив клуб в межах одного турніру, Mantra-команду не покидає."
        ul38: "Проміжні аукціони завжди проводяться в сліпому форматі."
        ul39: "Неможливо купувати та продавати гравців поза межами трансферних вікон крім єдиного виключення: якщо внаслідок трансферу у команди залишається тільки 1 воротар. У такому випадку, до команди долучається інший воротар тієї ж команди, воротар якої залишився в заявці. Після відкриття трансферного вікна менеджер зможе продати цього гравця згідно правил продажу."
        ul40: "Якщо менеджер пропускає 3 або більше аукціонів підряд і не виставляє ставки — адміністратор має право зробити ставку замість нього."
      basic:
        header1: "Навіщо грати?"
        header2: "Як формуються Ліги?"
        header3: "Доступні турніри"
        ol1: "Формуємо лігу з 6-10 менеджерів."
        ol2: "Проводимо аукціон, на якому менеджери формують власну команду."
        ol3: "Для кожного раунду менеджер обирає команду з 11 основних гравців за певною тактикою, а також формує лавку запасних."
        ol4: "Після реальних матчів, гравцям нараховують оцінку і бонуси/малуси за їх дії в матчах."
        ol5: "Сума балів усіх гравців перетворюється у голи команди."
        ol6: "Команда заробляє турнірні очки, якщо забиває не менше голів ніж команда суперника."
        ol7: "Команда, яка набрала найбільшу кількість очок в лізі, виграє кубок."
        paragraph1: "Ліги формуються на основі поданих заявок, де ви вказуєте, в яких турнірах ви хочете грати. Враховуються побажання менеджерів - ви можете створити лігу зі своїми друзями або приєднатися до інших учасників."
        paragraph2: "Протягом сезону склад ліги не змінюється."
        paragraph3: "У кожному турнірі може бути декілька ліг, у яких можна взяти участь."
        title: "Основне"
        ul1: "Унікальність гравців - кожен гравець буде унікальним у лізі і принесе очки лише одній команді."
        ul2: "Акцент на функціях менеджера – ви відчуєте себе справжнім футбольним тренером, який «ламає голову» над тим, кого поставити в стартовий склад."
        ul3: "Активною частиною гри стає тактика - яку схему вибрати: 4-4-2 чи 3-4-3, кого посадити на лавку, а хто не потрапить в заявку?"
        ul4: "Динаміка від раунду до раунду - на деяких виконавців цього тижня можна покластися, але наступного разу вони не принесуть стільки бонусів."
        ul5: "Чудова спільнота учасників, з якими можна обговорити всі події у світі футболу чи посперечатися про те, який чемпіонат сильніший?"
      bonuses:
        defence_note:
          ol1: "Якщо захисник не зіграв (оцінка 0) — його оцінка все одно враховується у розрахунку. Бонус захисту залежить від кількості захисних позицій у модулі: наприклад, у модулі 4-3-3 сума оцінок 4 захисників ділиться на 4, навіть якщо хтось із них отримав 0."
          ol2: "Якщо на захисну позицію в модулі виходить гравець з нехарактерною позицією (наприклад, DM на місці CB) — для бонусу захисту враховується лише базова оцінка гравця. Малус за позицію на розрахунок бонусу захисту не впливає."
