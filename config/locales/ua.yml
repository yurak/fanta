    guide:
      game_guide: "Посібник гри"
      header: "Як проходять змагання?"
      rules: "Детальні правила гри ви можете прочитати на "
      rules_link: "сторінці Правил"
      ul01: "Формуємо лігу із 8 менеджерів (якщо хочеш бути разом з другом – повідом нас і ми це врахуємо)."
      ul02: "Проводимо аукціон, де менеджери формують свої команди з 26 гравців. Кожен футболіст може бути в команді лише в одного менеджера ліги – того хто заплатив за нього найбільше. Продавати та купувати нових гравців в  команду можна лише в трансферні вікна."
      ul03: "Всі футболісти поділені на 11 унікальних позицій, на яких вони можуть виступати (деякі гравці можуть грати на кількох позиціях)."
      ul04: "Щотуру менеджер обирає схему на гру, склад із 11 основних гравців та лаву запасних (всі схеми - збалансовані і зазвичай включають, крім воротаря, 5 захисних та 5 атакуючих позицій)."
      ul05: "Гра відбувається за системую Head to Head, тобто в кожному раунді тобі протистоїть один з менеджерів-опонентів."
      ul06: "Старт Раунду (дедлайн для виставлення складу) - за 1,5 години до першого матчу туру (раунд завжди співпадає з туром календаря, якщо якийсь матч туру не був зіграний через перенесення, то даний тур не закривається, а очікує на догравання). Жодних «спарених» турів у нас немає."
      ul07: "За результатами реальних матчів, гравцям нараховується не лише бонуси та штрафи за їх дії, а й Базова оцінка. Сторонній статистичний ресурс виставляє гравцю цю оцінку залежно від його дій у реальному матчі. Ми у якості такого ресурсу використовуємо Fotmob."
      ul08: "Якщо гравець не зіграв у реальному Турі - його може замінити хтось з лави запасних, хто може зіграти на цій позиції."
      ul09: "Базові оцінки основних гравців, бонуси і малуси сумуються та конвертуються в ігрові голи за принципом: 72 бали – 1 гол, кожен наступний гол – за додаткові 7 балів."
      ul10: "Команда, яка забила більше голів у матчі - виграє його. За перемогу нараховується 3 очки, за нічию – 1. Турнірна таблиця формується на основі цих очків."
      ul11: "Команда, яка набрала найбільше очок за підсумками турніру, перемагає в лізі та здобуває трофей. "
