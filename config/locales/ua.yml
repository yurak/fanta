        ol1: "Оцінка позиції футболіста здійснюється за останнім сезоном (за умови, що гравець зіграв 15 і більше матчів). У випадку, якщо їх кількість менша – враховуються сумарні показники за 2 останні сезони (тут і далі – Аналізований період)."
        ol2: "Джерело даних – статистична інформація ресурсу Transfermarkt (тут і далі – Джерело)."
        ol3: "Відповідність Мантра позицій позиціям джерела така: GK – GK, RB – RB, CB – CB, LB – LB, RM|LM – WB, DM – DM, CM – CM, AM – AM, LW|RW – W, SS – FW, CF – ST."
        ol4: "При трансфері гравця в інший клуб, формація його нової команди не впливає на визначення його позиції."
        ol5: "Основною позицією гравця вважається та, де він в аналізованому періоді (п.1) зіграв більшість матчів. Зверніть увагу, що згідно п.3, кількість матчів на позиціях, вказаних через «|», сумується."
        ol6: "Якщо у гравця менше 5 матчів на основній позиції за Аналізований період, то цьому гравцю позиція призначається адміністрацією Мантри за допомогою додаткових даних із Джерела."
        ol7: "Для отримання додаткової позиції, футболіст має зіграти на ній не менше 30% матчів в аналізованому періоді."
        ol8: "Якщо додаткова позиція є «нижчою» за основну, то навіть при виконанні п.7 така позиція не додається (актуально для пар «WB-W», «СМ-АМ», «СВ-DM», «DM-CM», «W-FW», «AM-FW», де першими вказана «нижча» позиція). Приклад: 30 матчів, з яких 14 СМ і 16 АМ -> AM; 28 матчів: 15 DM, 13 CM -> DM+CM"
        ol9: "Додаткова позиція гравця може надаватись лише за умови виконання п.8 і розміщення додаткової позиції у тій же або сусідній лінії (порядок ліній: Зелена-Синя-Фіолетова-Червона)."
        ol10: "Якщо єдина позиція гравця LB або RB (або обидві ці позиції), то додаткова позиція WB надається автоматично."
        ol11: "Якщо крім основної позиції LB або RB, присутня також додаткова позиція CB, то п.10 не виконується."
        ol12: "Основна позиція WB може бути додатково розширена додатковою позицією (поза аналізованим періодом), якщо в останніх 2 сезонах гравець зіграв на позиціях CB, RB або LB більше 10 матчів."
        ol13: "Поєднання позиції ST з іншою не допускається."
        ol14: "Для гравців, у яких за аналізований період основною позицією є ST, додатково перевіряються останні 2 сезони (за умови, що в обох сезонах гравець зіграв понад 15 матчів). Якщо в обидвох сезонах основною позицією була ST то призначається ця позиція, в іншому випадку - FW."
        ol15: "Основною позицією гравця вважається FW, якщо за аналізований період він зіграв більшість матчів на позиціях LW/RW/AM, але при цьому понад 30% матчів сумарно було зіграно на позиціях CF та SS."
        ol16: "Гравець отримуватиме додаткову позицію FW, якщо за аналізований період він зіграв більшість матчів на позиціях LW/RW/AM, але при цьому понад 10% матчів сумарно (3 і більше) було зіграно на позиціях CF та SS."
      round:
        note:
          ol1: "Якщо менеджер не виставить свій склад до дедлайну - система автоматично скопіює для нього модуль та склад гравців з попереднього ігрового раунду (без врахування проведених замін)."
        paragraph1: "Сезон Mantra-футболу складається з ігрових раундів, які повністю збігаються з календарними турами реального футбольного чемпіонату."
        screen1:
          title: "Матч-центр"
          text: "Тут ви можете переглянути свій склад і прогрес проти суперника."
        title: "Ігровий Раунд"
        ul00_1: "Для участі в ігровому раунді менеджер спочатку має обрати "
        ul00_2: "модуль"
        ul00_3: "який визначатиме схему розстановки гравців його команди."
        ul01_1: "Відповідно до обраного модуля, маючи в своєму розпорядженні команду з 26 гравців, менеджер визначає 11 гравців "
        ul01_2: "основного складу"
        ul01_3: " і 9 запасних гравців."
        ul02: "Дедлайн вибору складу збігає за 1.5 години до початку першого матчу відповідного туру реального футбольного чемпіонату. Після дедлайну менеджер не може змінити обраний ним модуль та склад гравців."
        ul03: "Головна мета кожного менеджера – «забити» супернику більше голів, ніж він «заб’є» у відповідь."
        ul04_1: "Кількість забитих голів визначається на основі "
        ul04_2: "сумарного балу"
        ul04_3: "набраного всіма гравцями, з урахуванням "
        ul04_4: "бонусів та малусів"
        ul04_5: "та розраховується за "
        ul04_6: "простою формулою."
        ul05_1: "Для визначення базової оцінки виступу гравця у конкретному матчі використовується статистичний ресурс"
        ul05_2: " "
        ul06: "Для чемпіонату України джерелом оцінок є статистичний ресурс SofaScore."
        ul07: "Ігровий раунд повністю збігається із календарним туром турніру і завершується лише після того, як були зіграні усі матчі відповідного туру реального футбольного чемпіонату. Якщо у певному турі не було зіграно один чи декілька матчів (наприклад, матч було перенесено на іншу дату) – ігровий раунд не завершується допоки такі матчі не будуть зіграні."
      substitution:
        paragraph1: "Крім 11 гравців основного складу, менеджер обирає 9 запасних, серед яких обов’язково має бути хоча б 1 воротар."
        paragraph2: "Запасні гравці призначені для заміни гравців основного складу, які не зіграли у відповідному матчі свого клубу в реальному футбольному чемпіонаті."
        paragraph3: "Заміни відбуваються за такими правилами:"
        paragraph4: "Заміни це комплексний механізм, вони не виконуються окремо, а проводяться так, щоб здійснити максимально можливу кількість замін без малусів та максимально можливу кількість замін загалом (з урахуванням принципу мінімізації малусу)."
        paragraph5: "Так як на заміни впливає порядок у якому розташовані гравці на лаві запасних (чим вище гравець - тим у нього вищий пріоритет), то найкращий варіант заміни - гравець з найменшим малусом і найбільшим пріоритетом для здійснення необхідних замін."
        paragraph6: "При наявності кількох альтернативних варіантів замін з однаковим малусом, спричинених виключно порядком проведення замін, пріоритет надається тому варіанту, за якого місце в основі займе запасний із вищою позицією на лаві."
        paragraph7: "У випадку відсутності інших застережень, заміни виконуються зверху вниз – від воротарів до нападників."
        paragraph8: "Концепція замін не допускає заміни гравців основного складу між собою. Тобто, якщо гравець основного складу не зіграв, його може замінити лише гравець зі списку запасних (а не інший гравець основного складу який міг би зіграти на цій позиції)."
        paragraph9: "Порядок визначення малусів за позицію докладно описано в "
        paragraph10: "окремому пункті"
        screen1:
          title: "Заміни"
          text: "Приклад замін після гри - Доннарумма замінив Наваса, а Коло Муані замінив Мессі"
        title: "Заміни"
        ul00: "Якщо гравець основного складу не зіграв матч, його заміняє запасний гравець, який має необхідну ігрову позицію."
        ul01: "Якщо серед запасних гравців є декілька гравців, які можуть вийти на заміну за позицією – перевага надається тому гравцю, який розташований вище у списку запасних (порядок гравців на лавці запасних є порядком пріоритету)."
        ul02: "Якщо у списку запасних гравців немає гравця з необхідною ігровою позицією – на заміну виходить гравець, позиція якого дозволяє зробити заміну з малусом -1.5 очки."
        ul03: "Якщо у списку запасних гравців немає гравця, позиція якого дозволяє зробити заміну з малусом -1.5 очки, то на заміну виходить гравець, позиція якого дозволяє зробити заміну з малусом -3 очки."
        ul04: "Максимальна можлива кількість замін в турі для однієї команди – 9."
        ul05: "У випадку відсутності у списку запасних гравців, які можуть вийти на заміну з малусом, заміна не відбувається, а відповідна позиція залишається пустою (як правило, така ситуація є найгіршою для менеджера, тому при виборі складу рекомендуємо уважно вивчати вірогідність появи відповідного гравця в реальному матчі)."
      subtitle: "Mantra — це система фентезі-футболу, яка прийшла до нас з Італії, і орієнтована на тих, хто бажає зануритися в гру, а також підкреслює цінність вибору кожного гравця."
      subtitle1: "Фентезі-футбол – це гра, в якій учасники формують віртуальну команду з реальних футболістів і залежно від їхньої гри набирають очки."
      subtitle2: "Mantra — це наша реінтерпретація фентезі, свого роду просунутий рівень, де ми змінили все, що нас дратувало в класичному."
      subtitle3: "Це класний спосіб весело провести час з друзями та знайти нових!"
      title: "Правила"
