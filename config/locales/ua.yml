        paragraph5: "По закінченню матчу джерело оцінки ще певний час може змінювати базові оцінки як в сторону зменшення так і в сторону збільшення. Остаточними базовими оцінками вважаються ті які сформовані на момент закриття раунду (приблизно 18 годин після фінального свистка останнього матчу туру)."
