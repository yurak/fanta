      auction:
        header1: "Що таке живий аукціон?"
        header2: "Як проводиться сліпий аукціон?"
        header3: "Графік аукціону"
        header4: "Мінімальні ціни на сліпому аукціоні"
        note:
          ol1: "Перед проведенням аукціону рекомендуємо ознайомитись з доступними ігровими модулями (схемами розстановки гравців) і формувати склад своєї команди з урахуванням потрібних позицій."
          ol2: "Будь-які попередні домовленості між кількома менеджерами щодо обраних ними гравців та запропонованої за них ціни (до розкриття результатів чергового етапу аукціону) вважаються проявами нечесної гри та суворо заборонені спільнотою."
          ol3: "Протягом одного трансферного вікна менеджер не може знову придбати проданого ним же гравця."
        paragraph1: "Живий аукціон – це зустріч усіх менеджерів ліги (частіше онлайн, рідше – офлайн), які торгуються за гравців в режимі реального часу і з відкритою ставкою. В середньому живий аукціон триває 4 години (такий аукціон відбувається виключно при бажанні всіх менеджерів ліги та згоди адміністратора)."
        paragraph2: "Кожен менеджер по черзі називає футболіста, за якого він готовий віддати мінімум 1 мільйон зі свого бюджету. Після цього інші менеджери можуть (але не зобов’язані) зробити свою ставку. Кожна наступна ставка повинна бути більшою за попередню мінімум на один крок. Крок ставки визначається поточною ставкою. Якщо поточна ставка знаходиться в межах від 1 до 19 - мінімальний крок 1 мільйон, в діапазоні 20-29 - 2 мільйони, в діапазоні 30-39 - 3 мільйони і так далі. Якщо протягом 10 секунд ніхто не перевищив поточну ставку, гравець вважається проданим."
        paragraph3: "Сліпий аукціон є основним форматом, який застосовується для формування команд, оскільки не вимагає одночасної присутності усіх менеджерів онлайн чи офлайн у заздалегідь узгоджений час."
        paragraph4: "Для внесення змін до складу команд, виключення травмованих гравців або тих, які втратили місце в складі протягом сезону, передбачені проміжні аукціони."
        paragraph5: "Проміжні аукціони, на відміну від стартового, проводяться за таким принципом:"
        paragraph6: "На перших двох етапах стартового аукціону частина футболістів (близько 50) має свій мінімальний розмір ставки. Дані мінімальні ставки діють ЛИШЕ на перших двох етапах стартового аукціону і направлені на те, щоб склади команд були більш збалансовані."
        paragraph7: "Гравці матимуть мінімальну ціну, якщо зіграли 13+ матчів минулого сезону в цьому чемпіонаті і при цьому потрапили у топ 5 гравців чемпіонату на своїй позиції або мали середню загальну оцінку 8.0+ за результатами минулого сезону."
