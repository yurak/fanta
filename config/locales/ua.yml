        note:
          ol1: "У разі вилучення польовий гравець отримує бонус за кліншит лише тоді, якщо його клуб не пропустив жодного голу до кінця матчу."
          ol2: "Якщо воротар отримує червону картку, він не отримує бонус за кліншит."
          ol3: "Видалення гравця з лави запасних після того як його замінили на кліншит не впливає."
          ol4: "Розмір бонусу за кліншит не може бути вищим, ніж передбачено для позиції, на якій гравець опинився в модулі (наприклад, якщо гравець з «рідними» позиціями RB та WB опинився в модулі на позиції WB, його бонус за кліншит становитиме +0.5). І навпаки: якщо гравець опиниться в модулі на «нерідній» позиції, він може отримати бонус за кліншит, розмір якого не перевищує розміру бонусу за його «рідною» позицією (наприклад, розмір бонусу за кліншит гравця з «рідною» позицією DM, який опиниться на позиції CB в модулі, становитиме +0.5)."
          ol5: "При визначені автора голу, асиста, автоголу, відбиття пенальті, тощо враховується саме показник сервісу FotMob, який має зафіксувати та відобразити відповідний факт (у грі враховуються дані, які відображені ВИКЛЮЧНО у персональній статистиці гравця на сторінці матчу в FotMob). Показники інших футбольних порталів та сервісів до уваги не враховуються."
          ol6: "Незабитий пенальті не обов’язково є сейвом воротаря, тому воротар отримує відповідний бонус не за всі незабиті пенальті."
        paragraph1: "Крім базової оцінки, гравці можуть отримати додаткові бонуси за певні позитивні дії і малуси за негативні."
        paragraph2: "Розмір бонусу за забитий гол залежить від «рідної» позиції гравця:"
        paragraph3: "Розмір бонусу за гол гравця залежить саме від його «рідних» позицій, а не від позиції, на якій гравець «зіграв» в модулі MantraFootball."
        paragraph4: "Розмір бонусу за забитий пенальті не залежить від позиції гравця."
        paragraph5: "Цей бонус може отримати лише воротар. Розмір бонусу залежить від кількості відбитих ударів:"
        paragraph6: "Розмір бонусу за сухі ворота залежить від позиції гравця:"
        paragraph7: "Для отримання бонусу за кліншит гравцю необхідно одночасно відповідати таким критеріям:"
        paragraph8: "За пряму червону картку польовий гравець отримує малус -2, а воротар -3. Аналогічно і за вилучення через дві жовті картки."
        paragraph9: "Однак, якщо польовий гравець, який вже мав жовту картку, отримав пряму червону картку, його малус становитиме -2.5, а для воротаря -3.5."
        paragraph10: "Малуси за пропущені голи, в тому числі пенальті, отримує лише воротар."
        paragraph11: "Якщо певні гравці основного складу не зіграли в своєму матчі, а серед запасних немає гравця з відповідною «рідною» позицією, то його заміняє гравець іншої позиції з найнижчим малусом (спочатку обирається запасний гравець з малусом -1.5, а за відсутності такого – з малусом -3)."
        paragraph12: "Алгоритм проведення замін детально розписано у "
        paragraph13: "відповідному розділі"
        paragraph14: "Менеджер також може свідомо призначити гравця на «нерідну» позицію в основному складі."
        paragraph15: "В MantraFootball застосовується така матриця малусів за позиціями:"
        paragraph16: "Для підвищення цінності захисників, у MantraFootball присутній додатковий бонус захисту. Його розмір розраховується на основі середнього значення базових оцінок захисників (до врахування бонусів та малусів)."
        paragraph17: "Результат конвертується в додаткові очки для команди:"
