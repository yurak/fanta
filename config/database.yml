default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost

development:
  <<: *default
  database: mantra_development

test:
  <<: *default
  database: mantra_test

production:
  <<: *default
  database: mantra_production
  username: <%= Rails.application.credentials.dig(:db_prod, :username) %>
  password: <%= Rails.application.credentials.dig(:db_prod, :password) %>
  host: <%= Rails.application.credentials.dig(:db_prod, :host) %>
  port: 5432

staging:
  <<: *default
  database: mantra_staging
  username: <%= Rails.application.credentials.dig(:db_staging, :username) %>
  password: <%= Rails.application.credentials.dig(:db_staging, :password) %>
  host: <%= Rails.application.credentials.dig(:db_staging, :host) %>
  port: 5432
