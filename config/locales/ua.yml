  welcome:
    about:
      join: "Приєднуйтесь до нас!"
      paragraph1: "В 2017 році проект стартував серед львівських вболівальників «Мілану», як класичний фентезі футбол з однією лігою по Серії А для 5 гравців."
      paragraph2: "З 2018 року за уже перевіреними на практиці правилами була запущена АПЛ - в проекті з’явилось 2 ліги по даному турніру. З того часу щороку ми розширюємось. Так в сезоні 20/21 вперше стартував турнір на основі Бундесліги, а в сезоні 21/22 – Ла Ліги та Ліги 1. В сезоні 22/23 ми додаємо до списку доступних ліг Бельгію, Нідерланди, Португалію і Чемпіоншип."
      paragraph3: "Крім того, за дещо зміненими правилами, ми організовуємо турніри на основі Ліги Чемпіонів, Чемпіонату Європи і Ліги Націй. В планах – турнір на основі Чемпіонату світу в Катарі."
      paragraph4: "В 2022 ми все ще залишаємось проектом однодумців, які об’єднали свої професійні вміння (дизайнерів, маркетологів, розробників тощо) для розвитку українського футбольного фентезі."
